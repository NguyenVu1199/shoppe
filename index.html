<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tạo Link Shopee</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Popup Notification -->
    <div id="popup-noti" class="popup-noti hidden">
      <div class="popup-icon success" id="popup-icon">
        <i class="fa fa-check-circle"></i>
      </div>
      <span id="popup-text">Đã sao chép link!</span>
    </div>

    <div class="main-container">
      <header>
        <i class="fa fa-link icon-link"></i>
        <h1>Tạo Link Shopee</h1>
        <div class="url-tag">GiangNguyen</div>
      </header>
      <div class="content-box">
        <div class="form-section">
          <div class="form-title">
            <i class="fa fa-box"></i>
            <span>Link sản phẩm Shopee</span>
          </div>
          <div class="input-group">
            <input
              type="text"
              placeholder="Dán link Shopee vào đây..."
              id="shopee-link"
            />
          </div>
          <button id="generate-btn" class="main-btn">
            <i class="fa fa-pen"></i> Tạo Link Ngay
          </button>
        </div>
        <div class="link-result hidden" id="link-result">
          <div class="link-box">
            <div class="link-box-header">
              <span class="link-success"
                ><i class="fa fa-check-circle"></i> Link đã chuyển đổi</span
              >
              <button class="copy-link-btn" id="copy-link-btn">
                <i class="fa fa-copy"></i> Copy
              </button>
            </div>
            <div class="link-box-content" id="gen-link">
              <!-- Link gen sẽ xuất hiện ở đây -->
            </div>
          </div>
          <div class="link-actions">
            <a href="#" target="_blank" id="buy-link" class="action-btn buy-btn"
              ><i class="fa fa-shopping-cart"></i> Mua Ngay</a
            >
            <a
              href="https://www.facebook.com/share/p/1aG8MrXVJu/"
              target="_blank"
              id="share-link"
              class="action-btn share-btn"
              ><i class="fa-brands fa-facebook-f"></i> Chia sẻ</a
            >
          </div>
        </div>
        <div class="guide-section">
          <div class="guide-title">
            <i class="fa fa-info-circle"></i>
            <b>Hướng dẫn</b>
          </div>
          <ol>
            <li>Sau khi link được tạo, nhấn <b id="copyIcon">Copy</b>.</li>
            <li>
              Comment link vào bài viết này:
              <a
                href="https://www.facebook.com/share/p/1aG8MrXVJu/"
                class="fb-post-btn"
                ><i class="fa-brands fa-facebook-f"></i> Đến bài đăng
                Facebook</a
              >
            </li>
            <li>
              Sau đó ấn vào Link vừa comment ở bài viết trên để mở Shopee sẽ
              nhận được mã.
            </li>
          </ol>
        </div>
      </div>
    </div>
    <script>
      function showPopup(message, type) {
        console.log("type", type);
        const popup = document.getElementById("popup-noti");
        const popupText = document.getElementById("popup-text");
        const popupIconDiv = document.getElementById("popup-icon");
        popupText.textContent = message;

        if (type === "success") {
          popupIconDiv.className = "popup-icon success";
          popupIconDiv.innerHTML = '<i class="fa fa-check-circle"></i>';
        } else {
          popupIconDiv.className = "popup-icon error";
          popupIconDiv.innerHTML = '<i class="fa fa-times-circle"></i>';
        }

        popup.classList.remove("hidden");
        setTimeout(() => popup.classList.add("hidden"), 2500);
      }

      function isValidShopeeURL(url) {
        // Shopee short link: https://s.shopee.vn/...
        try {
          if (!url || url.length === 0) return 1;
          if (url.startsWith('https://s.shopee.vn/')) {
            return url;
          } else {
            return 2;
          }
        } catch {
          return 2;
        }
      }
      // Gen link Shopee affiliate
      function genAffiliateLink(originLink) {
        // Bạn có thể thay đổi logic này theo hệ thống của bạn
        // Demo: https://s.shopee.vn/an_redir?origin_link=...&affiliate_id=17395170033&sub_id=groupmiki----
        const encoded = encodeURIComponent(originLink);
        const realLink = `https://s.shopee.vn/an_redir?origin_link=${encoded}&affiliate_id=17395170033&sub_id=ginshop----`;
        return realLink;
      }

      const input = document.getElementById("shopee-link");
      const generateBtn = document.getElementById("generate-btn");
      const linkResult = document.getElementById("link-result");
      const genLink = document.getElementById("gen-link");
      const copyLinkBtn = document.getElementById("copy-link-btn");
      const buyLink = document.getElementById("buy-link");
      const shareLink = document.getElementById("share-link");

      // Also validate when click "Tạo Link Ngay"
      generateBtn.addEventListener("click", function () {
        const value = input.value.trim();
        const validationResult = isValidShopeeURL(value);

        if (validationResult === 1) {
          showPopup("Vui lòng nhập link!", "error");
          return;
        }

        if (validationResult === 2) {
          showPopup("Link không hợp lệ!", "error");
          return;
        }

        // Nếu tới đây nghĩa là hợp lệ
        const affiliateLink = genAffiliateLink(value);

        genLink.textContent = affiliateLink;
        buyLink.href = affiliateLink;
        linkResult.classList.remove("hidden");

        showPopup("Tạo link thành công!", "success");
      });
      copyLinkBtn.addEventListener("click", async function () {
        const textToCopy = genLink.textContent.trim();

        if (!textToCopy) {
          showPopup("Không có link để copy!", "error");
          return;
        }

        try {
          await navigator.clipboard.writeText(textToCopy);
          showPopup("Đã sao chép link!", "success");
        } catch (err) {
          showPopup("Copy thất bại!", "error");
        }
      });
    </script>
  </body>
</html>
